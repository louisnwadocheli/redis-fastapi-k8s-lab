{{- if .Values.redis.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim

metadata:
  name: redis-pvc

spec:
  accessModes:
    - ReadWriteOnce

  resources:
    requests:
      storage: {{ .Values.redis.persistence.storage }}

  storageClassName: {{ .Values.redis.persistence.storageClassName }}
{{- end }}
