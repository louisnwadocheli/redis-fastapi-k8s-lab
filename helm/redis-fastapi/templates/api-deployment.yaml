apiVersion: apps/v1
kind: Deployment

metadata:
  name: {{ .Values.api.name }}

spec:
  replicas: {{ .Values.api.replicaCount }}

  selector:
    matchLabels:
      app: {{ .Values.api.name }}

  template:
    metadata:
      labels:
        app: {{ .Values.api.name }}

    spec:
      containers:
        - name: {{ .Values.api.name }}
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}

          ports:
            - containerPort: {{ .Values.api.containerPort }}

          envFrom:
            - configMapRef:
                name: redis-cm

            - secretRef:
                name: redis-secret
