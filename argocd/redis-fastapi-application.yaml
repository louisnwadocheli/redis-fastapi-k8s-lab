apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: redis-fastapi
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/louisnwadocheli/redis-fastapi-k8s-lab.git
    targetRevision: main
    path: helm/redis-fastapi

    helm:
      valueFiles:
        - values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true
